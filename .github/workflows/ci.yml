name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck (Next.js app)
        run: npm run typecheck

      - name: Typecheck (CLI / lib)
        run: npm run typecheck:cli

      - name: Test
        run: npm test
        env:
          # Tests use Supabase + Pinecone clients that lazy-init when env
          # vars are absent — they short-circuit with null/warnings, no
          # hard failure. CI does not need credentials.
          NODE_OPTIONS: --max-old-space-size=4096

  # Self-heal Layer A: surface main-branch CI failures as agent_task rows
  # so they appear in the dashboard work queue. Only fires on main —
  # PR failures are visible in GitHub directly and don't need surfacing.
  report-ci-failure:
    runs-on: ubuntu-latest
    needs: test-and-typecheck
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Surface failure as agent_task
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/report-ci-failure.mjs
