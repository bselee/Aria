version: "3.9"

services:
  aria-db:
    image: postgres:16-alpine
    container_name: aria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: arialocal
      POSTGRES_DB: aria
    ports:
      - "0.0.0.0:5433:5432"
    volumes:
      - aria_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgrest:
    image: postgrest/postgrest:latest
    container_name: aria-postgrest
    restart: unless-stopped
    depends_on:
      aria-db:
        condition: service_healthy
    environment:
      # The DB URI must use the same password as POSTGRES_PASSWORD above
      PGRST_DB_URI: "postgres://aria:arialocal@aria-db:5432/aria"
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: aria-local-dev-secret-not-for-production
      PGRST_DB_EXTRA_SEARCH_PATH: "public"
      PGRST_DB_MAX_ROWS: 1000
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:5434
    ports:
      - "0.0.0.0:5434:3000"
    # No healthcheck: postgrest/postgrest:latest is a minimal image without
    # /bin/sh, curl, or wget. CMD-SHELL always fails, blocking port forwarding.
    # DB health check is the critical gate — PostgREST connects or it doesn't.

  minio:
    image: minio/minio:latest
    container_name: aria-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: aria
      MINIO_ROOT_PASSWORD: arialocal
    ports:
      - "127.0.0.1:5435:9000"
      - "127.0.0.1:5436:9001"
    volumes:
      - aria_miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: aria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set aria http://minio:9000 aria arialocal &&
      mc mb --ignore-existing aria/vendor_invoices &&
      mc anonymous set download aria/vendor_invoices &&
      echo 'MinIO initialized with vendor_invoices bucket'
      "
    restart: "no"

volumes:
  aria_pgdata:
  aria_miniodata:
